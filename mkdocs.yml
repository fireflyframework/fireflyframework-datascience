site_name: Firefly DataScience
site_description: AutoML that fuses GenAI with classical ML & Deep Learning — built on Firefly Agentic.
site_url: https://fireflyframework.github.io/fireflyframework-datascience/
repo_url: https://github.com/fireflyframework/fireflyframework-datascience
repo_name: fireflyframework/fireflyframework-datascience
copyright: Copyright 2026 Firefly Software Foundation · Apache-2.0
docs_dir: docs
# Flat .html URLs (not directory URLs) so relative image paths in raw HTML (<img src="img/...">)
# resolve from the site root on every page — fixes diagrams not rendering on GitHub Pages.
use_directory_urls: false

theme:
  name: material
  logo: img/logo.svg
  favicon: img/favicon.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: cyan
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: cyan
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - navigation.instant
    - navigation.instant.progress
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - footnotes

plugins:
  - search

extra_css:
  - stylesheets/firefly.css

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fireflyframework/fireflyframework-datascience
      name: Firefly DataScience on GitHub
    - icon: material/rocket-launch-outline
      link: https://github.com/fireflyframework/fireflyframework-agentic
      name: Firefly Agentic — the GenAI substrate
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/fireflyframework-datascience/
      name: fireflyframework-datascience on PyPI

nav:
  - Home: index.md
  - Getting started:
      - Quick Start: quickstart.md
      - Tutorial: tutorial.md
      - Samples: samples.md
      - Configuration: configuration.md
      - Configuring the LLM: llm-configuration.md
  - Concepts:
      - Architecture: architecture.md
      - Datasets: datasets.md
      - Classical AutoML: automl.md
      - GenAI Feature Engineering: genai-features.md
      - Agentic ML-Engineering Loop: agentic-loop.md
      - Deep Learning & TabFM: deep-learning.md
      - Serving & Lineage: serving.md
      - Security Model: security.md
      - Benchmarks: benchmarks.md
  - Use case — Lumen: use-case-lumen.md

# README.md is the GitHub folder index (table of contents); index.md is the site home. Keep the
# former in the repo but exclude it (and the local-only specs) from the built site.
exclude_docs: |
  README.md
  superpowers/
