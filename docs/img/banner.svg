<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="Firefly DataScience — AutoML that fuses GenAI with classical ML and Deep Learning, built on Firefly Agentic">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06121a"/>
      <stop offset="0.5" stop-color="#0a1b22"/>
      <stop offset="1" stop-color="#071419"/>
    </linearGradient>
    <radialGradient id="glowA" cx="34%" cy="30%" r="60%">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="86%" cy="78%" r="55%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wordmark" x1="84" y1="120" x2="700" y2="205" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#cdfaff"/>
      <stop offset="0.45" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#0e7d97"/>
    </linearGradient>
    <linearGradient id="rule" x1="84" y1="0" x2="430" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0.25"/>
    </linearGradient>
    <radialGradient id="dot" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#FFF9C1"/>
      <stop offset="1" stop-color="#F68000"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#3aa6bd" opacity="0.10"/>
    </pattern>
    <g id="node">
      <circle r="11" fill="#22d3ee" opacity="0.12"/>
      <circle r="6" fill="#67e8f9" opacity="0.28"/>
      <circle r="3" fill="#d6fbff"/>
    </g>
    <g id="fly">
      <circle r="13" fill="#f6a821" opacity="0.10"/>
      <circle r="7" fill="#ffc24a" opacity="0.22"/>
      <circle r="3.4" fill="#ffd980" opacity="0.7"/>
      <circle r="1.7" fill="#fff7e8"/>
    </g>
  </defs>

  <rect width="1280" height="320" fill="url(#sky)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <rect width="1280" height="320" fill="url(#glowA)"/>
  <rect width="1280" height="320" fill="url(#glowB)"/>

  <!-- data constellation (right) : a small graph of nodes + one amber firefly -->
  <g stroke="#3fb6cf" stroke-width="1.1" fill="none" opacity="0.4">
    <path d="M940 96 L1040 140"/>
    <path d="M1040 140 L980 214"/>
    <path d="M1040 140 L1136 120"/>
    <path d="M1040 140 L1150 206"/>
    <path d="M980 214 L1100 250"/>
    <path d="M940 96 L1136 120"/>
  </g>
  <use href="#node" transform="translate(940,96)"/>
  <use href="#fly"  transform="translate(1040,140) scale(1.15)"/>
  <use href="#node" transform="translate(980,214)"/>
  <use href="#node" transform="translate(1136,120) scale(0.85)"/>
  <use href="#node" transform="translate(1150,206) scale(0.8)"/>
  <use href="#node" transform="translate(1100,250) scale(0.7)"/>

  <!-- eyebrow -->
  <text x="86" y="92" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-weight="700" font-size="13" letter-spacing="3.5" fill="#5fb3c6">THE&#160;&#160;FIREFLY&#160;&#160;FRAMEWORK</text>

  <!-- glow accent near wordmark -->
  <circle cx="556" cy="120" r="5.5" fill="url(#dot)" opacity="0.9"/>

  <!-- wordmark -->
  <text x="82" y="178" font-family="Maven Pro,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-weight="800" font-size="78" letter-spacing="-1.6" fill="url(#wordmark)">Firefly DataScience</text>

  <!-- accent rule -->
  <rect x="86" y="210" width="346" height="2.4" rx="1.2" fill="url(#rule)"/>

  <!-- tagline -->
  <text x="86" y="250" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-weight="600" font-size="22" letter-spacing="0.2" fill="#dff6fb">AutoML that fuses GenAI with classical ML &amp; Deep Learning.</text>

  <!-- sub-tagline -->
  <text x="86" y="282" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-weight="450" font-size="15.5" letter-spacing="0.2" fill="#7fa9b1">Hexagonal · secure-by-default · governed GenAI · built on Firefly Agentic &amp; Pydantic AI</text>
</svg>
